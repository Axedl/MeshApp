<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#863bff" />
    <title>MESH Terminal</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        const isTauri = Boolean(window.__TAURI_INTERNALS__);
        if (isTauri) {
          // Service workers cannot re-fetch tauri:// protocol assets —
          // every intercepted request fails, CSS never loads, black screen.
          // Unregister any existing SW and force an immediate reload so the
          // very next load runs completely clean without SW interference.
          navigator.serviceWorker.getRegistrations().then((regs) => {
            if (regs.length > 0) {
              Promise.all(regs.map((r) => r.unregister())).then(() => {
                window.location.reload();
              });
            }
          });
        } else {
          // Web / Netlify deployment — register SW normally.
          window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js').catch(() => {});
          });
        }
      }
    </script>
  </body>
</html>
